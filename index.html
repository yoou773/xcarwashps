<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>X Car Wash</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap');

body{
  margin:0;
  font-family:'Cairo', sans-serif;
  background:#0b0b0f;
  color:#fff;
}

/* الهيدر */
header{
  background:linear-gradient(90deg,#00e5ff,#b400ff);
  padding:25px;
  text-align:center;
  box-shadow:0 0 20px #00e5ff;
}
header h1{margin:0;font-size:32px;}

/* القسم الرئيسي */
.hero{
  text-align:center;
  padding:50px 20px;
}
.hero h2{color:#00e5ff;font-size:28px;}
.hero p{color:#ccc;}

.btn{
  display:inline-block;
  margin:10px;
  padding:12px 25px;
  border-radius:30px;
  text-decoration:none;
  font-weight:bold;
  background:linear-gradient(90deg,#00e5ff,#b400ff);
  color:#fff;
  box-shadow:0 0 15px #00e5ff;
}

/* الخدمات */
.services{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:15px;
  padding:20px;
}
.card{
  background:#141420;
  padding:20px;
  border-radius:15px;
  text-align:center;
  border:1px solid #00e5ff;
  box-shadow:0 0 10px #00e5ff33;
}

/* معرض الصور */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:10px;
  padding:20px;
}
.gallery img{
  width:100%;
  border-radius:12px;
  border:2px solid #b400ff;
}

/* الحجز */
.booking{
  padding:20px;
  text-align:center;
}
input, select{
  width:90%;
  padding:10px;
  margin:8px;
  border-radius:10px;
  border:none;
}

/* الفوتر */
footer{
  text-align:center;
  padding:20px;
  background:#000;
  color:#777;
  margin-top:20px;
}

/* واتساب */
.whatsapp-float{
  position:fixed;
  bottom:20px;
  left:20px;
  width:60px;
  height:60px;
  background:#25D366;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  text-decoration:none;
  color:#fff;
  box-shadow:0 0 15px #25D366;
}
</style>
</head>

<body>

<header>
  <h1>X Car Wash 🚗</h1>
</header>

<section class="hero">
  <h2>غسيل سيارات احترافي بنظام نيون</h2>
  <p>نظافة • لمعان • سرعة • جودة</p>

  <a href="tel:0569416698" class="btn">اتصال مباشر</a>
  <a href="https://wa.me/970569416698" class="btn" style="background:green;">واتساب 💬</a>
</section>

<section class="services">
  <div class="card">غسيل خارجي</div>
  <div class="card">غسيل داخلي</div>
  <div class="card">تلميع كامل</div>
  <div class="card">تنظيف محرك</div>
</section>

<section class="gallery">
  <img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70">
  <img src="https://images.unsplash.com/photo-1605559424843-9e4c228bf1c2">
  <img src="https://images.unsplash.com/photo-1520340356584-f9917d1eea6f">
</section>

<section class="booking">
  <h2 style="color:#00e5ff;">احجز موعدك</h2>

  <input type="text" placeholder="الاسم">
  <input type="tel" placeholder="رقم الهاتف">

  <select>
    <option>اختر الخدمة</option>
    <option>غسيل خارجي</option>
    <option>غسيل داخلي</option>
    <option>تلميع كامل</option>
  </select>

  <input type="datetime-local">

  <a href="#" class="btn">إرسال الحجز</a>
</section>

<footer>
  © X Car Wash - جميع الحقوق محفوظة
</footer>

<a href="https://wa.me/970569416698" class="whatsapp-float">💬</a>

</body>
</html>
